<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Matrix Simulator with GIF Support</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(to bottom, #222, #111);
      color: #fff;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .matrix-container {
      display: grid;
      gap: 2px;
      margin: 20px 0;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(16, 1fr);
    }

    .matrix-cell {
      width: 20px;
      height: 20px;
      background-color: #444;
      border-radius: 4px;
      transition: background-color 0.1s ease;
    }

    .matrix-cell.active {
      background-color: var(--led-color, red);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
    }

    .controls label {
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #ddd;
    }

    .controls input, .controls button {
      padding: 8px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      margin-top: 5px;
    }

    .controls input {
      background-color: #333;
      color: #fff;
    }

    .controls button {
      background-color: #28a745;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .controls button:hover {
      background-color: #218838;
    }

    .controls button:active {
      background-color: #1e7e34;
    }
  </style>
</head>
<body>
  <h1>LED Matrix Simulator</h1>
  <div class="controls">
    <label>
      Upload GIF (16x16 px):
      <input type="file" id="gifInput" accept=".gif" />
    </label>
    <button id="playButton" disabled>Play GIF</button>
    <button id="pauseButton" disabled>Pause</button>
  </div>
  <div id="matrix" class="matrix-container"></div>

  <script>
    const matrixContainer = document.getElementById("matrix");
    const playButton = document.getElementById("playButton");
    const pauseButton = document.getElementById("pauseButton");
    const gifInput = document.getElementById("gifInput");

    const matrix = [];
    let frames = [];
    let intervalId = null;
    let currentFrame = 0;

    // Initialize the 16x16 matrix
    function initializeMatrix() {
      matrixContainer.innerHTML = "";
      for (let y = 0; y < 16; y++) {
        const row = [];
        for (let x = 0; x < 16; x++) {
          const cell = document.createElement("div");
          cell.classList.add("matrix-cell");
          matrixContainer.appendChild(cell);
          row.push(cell);
        }
        matrix.push(row);
      }
    }

    // Display a frame on the matrix
    function displayFrame(frame) {
      for (let y = 0; y < 16; y++) {
        for (let x = 0; x < 16; x++) {
          const pixel = frame[y * 16 + x]; // 1D array for 16x16 matrix
          const cell = matrix[y][x];
          const [r, g, b] = pixel; // RGB values
          cell.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }
      }
    }

    // Play GIF frames
    function playGIF() {
      if (frames.length === 0) return;
      playButton.disabled = true;
      pauseButton.disabled = false;
      intervalId = setInterval(() => {
        displayFrame(frames[currentFrame]);
        currentFrame = (currentFrame + 1) % frames.length;
      }, 100); // Adjust frame delay as needed
    }

    // Pause GIF playback
    function pauseGIF() {
      playButton.disabled = false;
      pauseButton.disabled = true;
      clearInterval(intervalId);
    }

    // Load and parse the GIF
    gifInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function () {
        const arrayBuffer = reader.result;
        const gif = new gifuct-js.Gif(new Uint8Array(arrayBuffer));
        gif.decompressFrames(true).forEach(frame => {
          frames.push(frame.pixels.map((p, i) => {
            if (i % 4 === 0) return [p, frame.pixels[i + 1], frame.pixels[i + 2]];
          }).filter(Boolean));
        });

        playButton.disabled = false;
      };
      reader.readAsArrayBuffer(file);
    });

    // Initialize everything
    initializeMatrix();
    playButton.addEventListener("click", playGIF);
    pauseButton.addEventListener("click", pauseGIF);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gifuct-js@2.1.2/lib/index.js"></script>
</body>
</html>
